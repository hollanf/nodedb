[workspace]
members = [
  "nodedb",
  "nodedb-bridge",
  "nodedb-wal",
  "nodedb-mem",
  "nodedb-crdt",
  "nodedb-raft",
  "nodedb-cluster",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "BUSL-1.1"

[workspace.dependencies]
# Foundation crates (internal)
nodedb-bridge = { path = "nodedb-bridge" }
nodedb-wal = { path = "nodedb-wal" }
nodedb-mem = { path = "nodedb-mem" }
nodedb-crdt = { path = "nodedb-crdt" }
nodedb-raft = { path = "nodedb-raft" }
nodedb-cluster = { path = "nodedb-cluster" }

# Async runtimes
tokio = { version = "1", features = ["full"] }

# Error handling & diagnostics
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1", features = ["derive"] }

# Memory
tikv-jemallocator = "0.6"
tikv-jemalloc-ctl = { version = "0.6", features = ["stats"] }

# System
libc = "0.2"

# Checksums
crc32c = "0.6"

# io_uring
io-uring = "0.7"

# CRDTs
loro = "1"

# Query engine
datafusion = "45"
datafusion-common = "45"
datafusion-execution = "45"
datafusion-expr = "45"
datafusion-physical-plan = "45"

# Config & serialization
toml = "0.8"
anyhow = "1"
serde_json = "1"

# MessagePack
rmp-serde = "1"
rmpv = "1"

# Storage
redb = "2"
roaring = "0.10"

# Random
rand = "0.9"

# Ecosystem
numr = "0.5"
nexar = "0.1"

# Compression
zstd = "0.13"

# PostgreSQL wire protocol
pgwire = { version = "0.38", default-features = false, features = [
  "server-api-aws-lc-rs",
] }
async-trait = "0.1"
futures = "0.3"

# Password hashing
argon2 = "0.5"

# Benchmarking
fluxbench = "0.1"
