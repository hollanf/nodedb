<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NodeDB wordmark</title>
  <desc id="desc">NodeDB logo with horizontal wordmark.</desc>
  <defs>
    <linearGradient id="mark-grad" x1="0.1" y1="0.9" x2="0.9" y2="0.1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
    <linearGradient id="db-grad" x1="420" y1="0" x2="660" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3BC8E4" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
    <filter id="card-shadow" x="0" y="0" width="500" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#031328" flood-opacity="0.16" />
    </filter>
  </defs>

  <g filter="url(#card-shadow)">
    <rect x="24" y="20" width="452" height="112" rx="22" fill="#031B34" />
    <rect x="25" y="21" width="450" height="110" rx="21" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="2" />
  </g>

  <g transform="translate(18 5)">
    <path
      d="M127 33 112 23 41 64v82l36.546 21.773.245-93.785 65.227 62.239.491-89.092 35.81 23.245.245 75.374L112 187 96.755 177.736"
      transform="translate(54 18) scale(0.5)"
      fill="none"
      stroke="url(#mark-grad)"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <text x="160" y="92" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-0.04em">Node</text>
    <text x="303" y="92" fill="url(#db-grad)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-0.04em">DB</text>
  </g>
</svg>
